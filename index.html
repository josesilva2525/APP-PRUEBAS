<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SaaS Planificación Estratégica</title>
    
    <!-- PWA / Acceso directo en iOS y Android -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Plan Estratégico">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

    <!-- Icono de la App (Base64) -->
    <!-- INSTRUCCIONES: Reemplaza "TU_IMAGEN_BASE_64_AQUI" con el código Base64 real de tu imagen (sin el data:image/jpeg;base64, inicial que ya está incluido) -->
    <link rel="apple-touch-icon" href="data:image/jpeg;base64,TU_IMAGEN_BASE_64_AQUI">
    <link rel="icon" type="image/jpeg" href="data:image/jpeg;base64,TU_IMAGEN_BASE_64_AQUI">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Configuración Tailwind (Paleta SaaS Moderno) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 800: '#1e293b', 900: '#0f172a' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Grid Semanal a 24 horas completas (96 intervalos de 15 min) */
        .week-grid {
            display: grid;
            grid-template-columns: 50px repeat(7, minmax(100px, 1fr));
            grid-template-rows: repeat(96, minmax(30px, 1fr)); 
            position: relative;
        }

        /* Grid Mensual */
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: minmax(110px, auto); 
            gap: 1px;
            background-color: #e2e8f0;
        }
        .dark .month-grid { background-color: #334155; }

        .time-label {
            border-right: 1px solid #e2e8f0; border-bottom: 1px solid #f1f5f9;
            text-align: right; padding-right: 8px; font-size: 0.75rem; color: #64748b;
            position: sticky; left: 0; background: inherit; z-index: 10;
        }
        .dark .time-label { border-color: #334155; border-bottom-color: #1e293b; color: #94a3b8; }

        .calendar-cell { border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .dark .calendar-cell { border-color: #1e293b; }

        .task-card {
            margin: 1px 2px; border-radius: 6px; padding: 6px; font-size: 0.8rem;
            overflow: hidden; transition: all 0.2s; z-index: 20; border-left-width: 3px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between;
        }
        .task-card:hover { z-index: 30; transform: scale(1.02); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .month-day-cell { background: #fff; padding: 8px; transition: background 0.2s; }
        .dark .month-day-cell { background: #0f172a; }
        .month-day-cell:hover { background: #f8fafc; }
        .dark .month-day-cell:hover { background: #1e293b; }
        .not-current-month { opacity: 0.4; background: #f1f5f9; }
        .dark .not-current-month { background: #020617; }

        /* Estilos de selects para parecerse a los inputs originales */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="bg-surface-50 text-slate-900 dark:bg-surface-900 dark:text-slate-100 h-screen flex overflow-hidden transition-colors duration-200 relative">

    <!-- Overlay oscuro para iPad vertical/móvil -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity"></div>

    <!-- Sidebar Principal -->
    <aside id="main-sidebar" class="w-80 bg-white dark:bg-surface-800 border-r border-slate-200 dark:border-slate-700 flex flex-col h-full shadow-2xl lg:shadow-none z-50 fixed lg:relative transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-primary-50 dark:bg-primary-900/20">
            <h1 class="text-lg font-bold text-primary-600 dark:text-primary-400"><i class="fa-solid fa-layer-group mr-2"></i>Estrategia Bisemanal</h1>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="p-2 w-10 h-10 flex items-center justify-center text-slate-500 hover:text-primary-600 dark:text-slate-400 transition rounded-full hover:bg-slate-100 dark:hover:bg-slate-700">
                    <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
                </button>
                <button onclick="toggleSidebar()" class="lg:hidden p-2 w-10 h-10 flex items-center justify-center text-slate-500 hover:text-primary-600 dark:text-slate-400 transition rounded-full hover:bg-slate-100 dark:hover:bg-slate-700">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
        </div>

        <!-- Resumen Dinámico -->
        <div class="p-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-surface-900/50">
            <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Resumen del Periodo</h3>
            <div id="dynamic-summary" class="space-y-3"></div>
        </div>

        <!-- Árbol de Categorías y Objetivos -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4" id="sidebar-categories"></div>

        <div class="p-4 border-t border-slate-200 dark:border-slate-700 space-y-3 pb-6 lg:pb-4">
            <button onclick="openCategoryModal()" class="w-full py-3 lg:py-2.5 px-4 bg-white dark:bg-surface-800 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium transition shadow-sm flex items-center justify-center">
                <i class="fa-solid fa-folder-plus mr-2"></i> Nueva Categoría
            </button>
            <button onclick="openGoalModal()" class="w-full py-3 lg:py-2.5 px-4 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium transition shadow-sm flex items-center justify-center">
                <i class="fa-solid fa-bullseye mr-2"></i> Nuevo Objetivo
            </button>
        </div>
    </aside>

    <!-- Contenido Principal -->
    <main class="flex-1 flex flex-col h-full overflow-hidden w-full relative">
        
        <!-- Header Multidispositivo Completamente Responsivo -->
        <header class="bg-white dark:bg-surface-800 border-b border-slate-200 dark:border-slate-700 flex flex-wrap lg:flex-nowrap items-center justify-between px-2 sm:px-4 lg:px-6 shadow-sm z-30 shrink-0 py-2 lg:py-0 lg:h-20 gap-y-2 lg:gap-0">
            
            <!-- Grupo Izquierdo: Menú Móvil, Botones de Vista (Desktop) y Navegador de Fechas -->
            <div class="flex items-center w-full lg:w-auto justify-between lg:justify-start">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="lg:hidden mr-1 sm:mr-3 p-1.5 sm:p-2 w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition">
                        <i class="fa-solid fa-bars text-lg sm:text-xl"></i>
                    </button>
                    
                    <div class="hidden xl:flex bg-slate-100 dark:bg-slate-700 p-1 rounded-lg mr-4">
                        <button onclick="changeView('week')" id="btn-view-week" class="px-4 py-2 text-sm font-medium rounded-md shadow-sm bg-white dark:bg-surface-800 text-primary-600 dark:text-primary-400">Semana</button>
                        <button onclick="changeView('month')" id="btn-view-month" class="px-4 py-2 text-sm font-medium rounded-md text-slate-500 dark:text-slate-300 hover:text-slate-700 dark:hover:text-white">Mes</button>
                    </div>
                    <div class="hidden xl:block h-8 w-px bg-slate-300 dark:bg-slate-600 mr-4"></div>
                </div>
                
                <div class="flex items-center space-x-1 sm:space-x-2">
                    <button onclick="navigateDate(-1)" class="p-1.5 sm:p-2 w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 transition"><i class="fa-solid fa-chevron-left"></i></button>
                    <h2 class="text-sm sm:text-base lg:text-xl font-bold w-[120px] sm:w-[150px] lg:min-w-[180px] text-center truncate" id="current-date-label">Marzo 2026</h2>
                    <button onclick="navigateDate(1)" class="p-1.5 sm:p-2 w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 transition"><i class="fa-solid fa-chevron-right"></i></button>
                    <button onclick="goToToday()" class="ml-1 sm:ml-2 px-2.5 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm lg:text-base border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition">Hoy</button>
                </div>
            </div>
            
            <!-- Grupo Derecho: Botones de Acción (Exportar, Importar, Nueva Tarea) -->
            <!-- En pantallas pequeñas se crea scroll horizontal si no caben -->
            <div class="flex items-center gap-1.5 sm:gap-2 w-full lg:w-auto justify-end overflow-x-auto scrollbar-hide py-1">
                
                <!-- Botones de Vista (Móvil / Tablet) -->
                <button onclick="changeView('week')" id="btn-view-week-mobile" class="xl:hidden p-2 w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center text-primary-600 dark:text-primary-400 shrink-0"><i class="fa-solid fa-calendar-week text-lg"></i></button>
                <button onclick="changeView('month')" id="btn-view-month-mobile" class="xl:hidden p-2 w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center text-slate-400 shrink-0"><i class="fa-solid fa-calendar-days text-lg"></i></button>
                
                <div class="xl:hidden h-6 w-px bg-slate-300 dark:bg-slate-600 mx-1 shrink-0"></div>

                <!-- BOTÓN EXPORTAR -->
                <button onclick="exportData()" class="py-2 px-2.5 sm:px-3 lg:px-4 lg:py-2.5 bg-white dark:bg-surface-800 text-slate-700 dark:text-slate-200 border border-slate-300 dark:border-slate-600 rounded-lg text-xs sm:text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition shadow-sm flex items-center shrink-0" title="Exportar Backup">
                    <i class="fa-solid fa-file-export sm:mr-1.5 lg:mr-2 text-sm lg:text-base"></i> <span class="hidden sm:inline">Exportar</span>
                </button>

                <!-- BOTÓN IMPORTAR -->
                <button onclick="document.getElementById('file-import').click()" class="py-2 px-2.5 sm:px-3 lg:px-4 lg:py-2.5 bg-white dark:bg-surface-800 text-slate-700 dark:text-slate-200 border border-slate-300 dark:border-slate-600 rounded-lg text-xs sm:text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition shadow-sm flex items-center shrink-0" title="Importar JSON o Backup">
                    <i class="fa-solid fa-file-import sm:mr-1.5 lg:mr-2 text-sm lg:text-base"></i> <span class="hidden sm:inline">Importar</span>
                </button>
                <input type="file" id="file-import" accept=".json" class="hidden" onchange="processImport(event)">

                <!-- BOTÓN NUEVA TAREA -->
                <button onclick="openTaskModal()" class="py-2 px-3 sm:px-4 lg:px-5 lg:py-2.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-lg text-xs sm:text-sm font-semibold hover:opacity-90 transition shadow-sm flex items-center shrink-0">
                    <i class="fa-solid fa-plus sm:mr-1.5 lg:mr-2 text-sm lg:text-base"></i> <span class="inline">Nueva Tarea</span>
                </button>
            </div>
        </header>

        <!-- Contenedor del Calendario -->
        <div class="flex-1 overflow-auto relative bg-white dark:bg-surface-800" id="calendar-container">
            
            <!-- Vista Semanal -->
            <div id="view-week" class="block h-full flex flex-col min-w-[700px] lg:min-w-full">
                <!-- Balance Semanal (Subheader) -->
                <div id="weekly-balance" class="bg-slate-50 dark:bg-surface-900 border-b border-slate-200 dark:border-slate-700 p-3 lg:px-6 flex flex-col sm:flex-row sm:items-center gap-4 shrink-0">
                    <!-- Inyectado por JS -->
                </div>
                
                <div class="sticky top-0 z-40 flex bg-white dark:bg-surface-800 border-b border-slate-200 dark:border-slate-700 shadow-sm pl-[50px]" id="week-headers"></div>
                <div class="week-grid bg-white dark:bg-surface-800 flex-1" id="week-grid"></div>
            </div>
            
            <!-- Vista Mensual -->
            <div id="view-month" class="hidden h-full flex flex-col p-2 sm:p-4 min-w-[600px] lg:min-w-full">
                <div class="grid grid-cols-7 gap-1 mb-1" id="month-headers"></div>
                <div class="month-grid flex-1 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700" id="month-grid"></div>
            </div>
        </div>
    </main>

    <!-- Modales -->
    <!-- Modal: Categoría -->
    <div id="modal-category" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[60] backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-surface-800 rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <h3 class="text-xl font-bold mb-4" id="modal-category-title">Nueva Categoría</h3>
            <form id="form-category" onsubmit="handleCategorySubmit(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1.5">Nombre</label>
                    <input type="text" id="cat-name" required class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-primary-500 text-base">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1.5">Color Identificativo</label>
                    <input type="color" id="cat-color" value="#6366f1" class="w-full h-14 rounded-lg cursor-pointer border border-slate-300 dark:border-slate-600">
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal('modal-category')" class="px-5 py-3 text-sm md:text-base font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-6 py-3 text-sm md:text-base font-medium bg-primary-600 text-white rounded-lg hover:bg-primary-700 shadow-sm">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Objetivo Bisemanal -->
    <div id="modal-goal" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[60] backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-surface-800 rounded-2xl shadow-2xl w-full max-w-md p-6">
            <h3 class="text-xl font-bold mb-1" id="modal-goal-title">Nuevo Objetivo Bisemanal</h3>
            <p class="text-sm text-slate-500 mb-5">La duración se fijará estrictamente en 14 días.</p>
            <form id="form-goal" onsubmit="handleGoalSubmit(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1.5">Categoría</label>
                    <select id="goal-cat" required class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-surface-900 outline-none focus:ring-2 focus:ring-primary-500 text-base"></select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1.5">Título del Objetivo</label>
                    <input type="text" id="goal-title" required class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-primary-500 text-base">
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-1.5">Fecha de Inicio</label>
                        <input type="date" id="goal-start" required class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-primary-500 text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1.5">Presupuesto (Horas)</label>
                        <input type="number" id="goal-hours" required min="1" max="336" class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-primary-500 text-base">
                    </div>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal('modal-goal')" class="px-5 py-3 text-sm md:text-base font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-6 py-3 text-sm md:text-base font-medium bg-primary-600 text-white rounded-lg hover:bg-primary-700 shadow-sm">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Tarea -->
    <div id="modal-task" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[60] backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-surface-800 rounded-2xl shadow-2xl w-full max-w-md p-6">
            <h3 class="text-xl font-bold mb-4" id="modal-task-title">Nueva Tarea</h3>
            <form id="form-task" onsubmit="handleTaskSubmit(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1.5">Asignar a Objetivo</label>
                    <select id="task-goal" required class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-surface-900 outline-none focus:ring-2 focus:ring-primary-500 text-base"></select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1.5">Nombre de la Tarea</label>
                    <input type="text" id="task-title" required class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-primary-500 text-base">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1.5">Fecha Asignada</label>
                    <input type="date" id="task-date" required class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-primary-500 text-base" onchange="updateAvailableTimes()">
                </div>
                
                <!-- SECCIÓN: CHECKBOXES MULTI-DÍA (Solo visible al editar) -->
                <div id="edit-days-container" class="mb-4 hidden">
                    <label class="block text-xs font-semibold text-primary-600 dark:text-primary-400 mb-2 uppercase tracking-wide">Sincronizar ajuste con esta semana:</label>
                    <div class="flex justify-between gap-1 bg-slate-50 dark:bg-surface-900 p-2.5 rounded-lg border border-slate-200 dark:border-slate-700">
                        <label class="flex flex-col items-center cursor-pointer transition-opacity"><span class="text-[11px] font-bold mb-1 text-slate-500">L</span><input type="checkbox" value="1" class="edit-day-cb w-4 h-4 text-primary-600 rounded border-slate-300"></label>
                        <label class="flex flex-col items-center cursor-pointer transition-opacity"><span class="text-[11px] font-bold mb-1 text-slate-500">M</span><input type="checkbox" value="2" class="edit-day-cb w-4 h-4 text-primary-600 rounded border-slate-300"></label>
                        <label class="flex flex-col items-center cursor-pointer transition-opacity"><span class="text-[11px] font-bold mb-1 text-slate-500">X</span><input type="checkbox" value="3" class="edit-day-cb w-4 h-4 text-primary-600 rounded border-slate-300"></label>
                        <label class="flex flex-col items-center cursor-pointer transition-opacity"><span class="text-[11px] font-bold mb-1 text-slate-500">J</span><input type="checkbox" value="4" class="edit-day-cb w-4 h-4 text-primary-600 rounded border-slate-300"></label>
                        <label class="flex flex-col items-center cursor-pointer transition-opacity"><span class="text-[11px] font-bold mb-1 text-slate-500">V</span><input type="checkbox" value="5" class="edit-day-cb w-4 h-4 text-primary-600 rounded border-slate-300"></label>
                        <label class="flex flex-col items-center cursor-pointer transition-opacity"><span class="text-[11px] font-bold mb-1 text-slate-500">S</span><input type="checkbox" value="6" class="edit-day-cb w-4 h-4 text-primary-600 rounded border-slate-300"></label>
                        <label class="flex flex-col items-center cursor-pointer transition-opacity"><span class="text-[11px] font-bold mb-1 text-slate-500">D</span><input type="checkbox" value="0" class="edit-day-cb w-4 h-4 text-primary-600 rounded border-slate-300"></label>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-1">Solo marcables los días que ya tengan una tarea con este mismo nombre.</p>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-1.5">Inicio (Horas Libres)</label>
                        <select id="task-start" required class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-surface-900 outline-none focus:ring-2 focus:ring-primary-500 text-base" onchange="updateEndTimes()"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1.5">Fin (Hasta prox. tarea)</label>
                        <select id="task-end" required class="w-full px-4 py-3 md:py-4 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-surface-900 outline-none focus:ring-2 focus:ring-primary-500 text-base"></select>
                    </div>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal('modal-task')" class="px-5 py-3 text-sm md:text-base font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-6 py-3 text-sm md:text-base font-medium bg-primary-600 text-white rounded-lg hover:bg-primary-700 shadow-sm">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Mover Tarea Rápido -->
    <div id="modal-move" class="fixed inset-0 bg-transparent hidden items-center justify-center z-[70]" onclick="closeModal('modal-move')">
        <div class="bg-white dark:bg-surface-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-2xl w-56 py-2 absolute overflow-hidden" id="move-menu" onclick="event.stopPropagation()">
            <h4 class="px-5 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider bg-slate-50 dark:bg-surface-900 border-b border-slate-100 dark:border-slate-700">Mover Tarea</h4>
            <button onclick="executeTaskMove(1)" class="w-full text-left px-5 py-4 text-sm md:text-base hover:bg-primary-50 dark:hover:bg-primary-900/20 font-medium transition">A mañana (+1 día)</button>
            <button onclick="executeTaskMove(7)" class="w-full text-left px-5 py-4 text-sm md:text-base hover:bg-primary-50 dark:hover:bg-primary-900/20 font-medium transition border-t border-slate-50 dark:border-slate-700">A sig. semana (+7 días)</button>
        </div>
    </div>

    <!-- Modal: Alerta Personalizada -->
    <div id="modal-alert" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[80] backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-surface-800 rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 dark:bg-red-900/30 mb-4">
                <i class="fa-solid fa-triangle-exclamation text-red-600 dark:text-red-400 text-xl"></i>
            </div>
            <h3 class="text-lg font-bold mb-2 text-slate-900 dark:text-white">Aviso</h3>
            <p id="alert-msg" class="text-sm text-slate-500 dark:text-slate-400 mb-6"></p>
            <button onclick="closeModal('modal-alert')" class="w-full px-5 py-3 text-sm md:text-base font-medium bg-primary-600 text-white rounded-lg hover:bg-primary-700 shadow-sm transition">Entendido</button>
        </div>
    </div>

    <!-- Modal: Confirmación Personalizada -->
    <div id="modal-confirm" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[80] backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-surface-800 rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-orange-100 dark:bg-orange-900/30 mb-4">
                <i class="fa-solid fa-circle-question text-orange-600 dark:text-orange-400 text-xl"></i>
            </div>
            <h3 class="text-lg font-bold mb-2 text-slate-900 dark:text-white">Confirmación</h3>
            <p id="confirm-msg" class="text-sm text-slate-500 dark:text-slate-400 mb-6"></p>
            <div class="flex justify-center space-x-3">
                <button onclick="closeModal('modal-confirm')" class="flex-1 px-5 py-3 text-sm md:text-base font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition">Cancelar</button>
                <button onclick="executeConfirm()" class="flex-1 px-5 py-3 text-sm md:text-base font-medium bg-red-600 text-white rounded-lg hover:bg-red-700 shadow-sm transition">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- JS Logic -->
    <script>
        // --- 0. FUNCIONES DE FECHAS (JavaScript Puro) ---
        const parseISO = (str) => {
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d); 
        };
        const addDays = (date, days) => {
            const res = new Date(date);
            res.setDate(res.getDate() + days);
            return res;
        };
        const subWeeks = (date, weeks) => addDays(date, -weeks * 7);
        const addWeeks = (date, weeks) => addDays(date, weeks * 7);
        const addMonths = (date, months) => {
            const res = new Date(date);
            res.setMonth(res.getMonth() + months);
            return res;
        };
        const subMonths = (date, months) => addMonths(date, -months);
        const isSameDay = (d1, d2) => 
            d1.getFullYear() === d2.getFullYear() && 
            d1.getMonth() === d2.getMonth() && 
            d1.getDate() === d2.getDate();
        const isWithinInterval = (date, { start, end }) => {
            const t = date.getTime();
            return t >= start.getTime() && t <= end.getTime();
        };
        const startOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1);
        const endOfMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0, 23, 59, 59, 999);
        const getDay = (date) => date.getDay();
        const startOfWeek = (date, { weekStartsOn = 1 } = {}) => {
            const res = new Date(date);
            const day = res.getDay();
            const diff = (day < weekStartsOn ? 7 : 0) + day - weekStartsOn;
            res.setDate(res.getDate() - diff);
            res.setHours(0, 0, 0, 0);
            return res;
        };
        const endOfWeek = (date, { weekStartsOn = 1 } = {}) => {
            const start = startOfWeek(date, { weekStartsOn });
            const res = addDays(start, 6);
            res.setHours(23, 59, 59, 999);
            return res;
        };
        const format = (date, fmt) => {
            const d = date.getDate();
            const m = date.getMonth();
            const y = date.getFullYear();
            const pad = (n) => String(n).padStart(2, '0');
            const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            const monthsShort = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

            if (fmt === 'yyyy-MM-dd') return `${y}-${pad(m+1)}-${pad(d)}`;
            if (fmt === 'dd MMM') return `${pad(d)} ${monthsShort[m]}`;
            if (fmt === 'dd/MM') return `${pad(d)}/${pad(m+1)}`;
            if (fmt === 'MMMM yyyy') return `${months[m]} ${y}`;
            if (fmt === 'EEEE') return days[date.getDay()];
            if (fmt === 'd') return String(d);
            if (fmt === 'w') {
                const target = new Date(date.valueOf());
                const dayNr = (date.getDay() + 6) % 7;
                target.setDate(target.getDate() - dayNr + 3);
                const firstThursday = target.valueOf();
                target.setMonth(0, 1);
                if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
                return 1 + Math.ceil((firstThursday - target) / 604800000);
            }
            return date.toString();
        };

        // --- LÓGICA DE HORAS Y GRID (00:00 a 24:00) ---
        function timeToMinutes(timeStr) {
            let [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function calculateHours(start, end) {
            return (timeToMinutes(end) - timeToMinutes(start)) / 60;
        }

        function timeToGridRow(timeStr) {
            let mins = timeToMinutes(timeStr);
            if (mins >= 1439) return 97; 
            return Math.floor(mins / 15) + 1;
        }

        function minsToTimeStr(mins) {
            let h = Math.floor(mins / 60);
            let m = mins % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        // --- 1. ESTADO GLOBAL Y VARIABLES DE EDICIÓN ---
        let data = {
            categories: [],
            biweeklyGoals: [],
            tasks: []
        };
        
        let viewState = {
            currentDate: parseISO('2026-03-02'), 
            mode: 'week' 
        };

        let editingCategoryId = null;
        let editingGoalId = null;
        let editingTaskId = null;
        let taskToMoveId = null;
        let isSidebarOpen = false;
        let confirmCallback = null;

        const generateId = () => '_' + Math.random().toString(36).substr(2, 9);
        const STORAGE_KEY = 'saasStrategicData_V4'; 

        // --- 2. PERSISTENCIA Y CARGA ---
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                data = JSON.parse(stored);
            } else {
                seedData();
            }
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            renderAll(); 
        }

        function seedData() {
            data = { categories: [], biweeklyGoals: [], tasks: [] };
            saveData();
        }

        function getGoalStats(goalId) {
            const goal = data.biweeklyGoals.find(g => g.id === goalId);
            if(!goal) return null;

            const goalTasks = data.tasks.filter(t => t.goalId === goalId);
            const totalHoursPlanned = goalTasks.reduce((sum, t) => sum + t.estimatedHours, 0);
            const completedHours = goalTasks.filter(t => t.completed).reduce((sum, t) => sum + t.estimatedHours, 0);
            
            const progress = goal.budgetedHours > 0 ? Math.min((completedHours / goal.budgetedHours) * 100, 100) : 0;
            const health = totalHoursPlanned > goal.budgetedHours ? 'overbudget' : 'ok';

            return { totalHoursPlanned, completedHours, budget: goal.budgetedHours, progress, health };
        }

        function calculateDateRangeStats(startDate, endDate) {
            const tasksInRange = data.tasks.filter(t => isWithinInterval(parseISO(t.date), { start: startDate, end: endDate }));
            let sumCat = {};
            tasksInRange.forEach(t => {
                const goal = data.biweeklyGoals.find(g => g.id === t.goalId);
                if(goal) {
                    if(!sumCat[goal.categoryId]) sumCat[goal.categoryId] = 0;
                    sumCat[goal.categoryId] += t.estimatedHours;
                }
            });
            return sumCat;
        }

        function toggleTaskCompletion(taskId, event) {
            if(event) event.stopPropagation();
            const task = data.tasks.find(t => t.id === taskId);
            if(task && !task.isImported) {
                task.completed = !task.completed;
                saveData();
            }
        }

        function toggleGoalTasks(goalId) {
            const tasksDiv = document.getElementById(`tasks-goal-${goalId}`);
            if(tasksDiv) tasksDiv.classList.toggle('hidden');
            const icon = document.getElementById(`icon-goal-${goalId}`);
            if(icon) {
                icon.classList.toggle('fa-chevron-down');
                icon.classList.toggle('fa-chevron-up');
            }
        }

        // --- 4. RENDERIZADO UI ---
        function renderAll() {
            renderSidebar();
            if(viewState.mode === 'week') renderWeekView();
            else renderMonthView();
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-categories');
            container.innerHTML = '';

            data.categories.forEach(cat => {
                const catEl = document.createElement('div');
                catEl.className = 'bg-white dark:bg-surface-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm relative overflow-hidden';
                catEl.style.borderLeftColor = cat.color;
                catEl.style.borderLeftWidth = '4px';

                let html = `
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-bold text-slate-800 dark:text-white flex items-center gap-2 text-sm md:text-base">
                            ${cat.name}
                        </h3>
                        <div class="flex gap-1 opacity-100 xl:opacity-0 group-hover:opacity-100">
                            <button onclick="editCategory('${cat.id}')" class="p-2 md:p-1.5 w-8 h-8 flex items-center justify-center rounded-md text-slate-400 hover:text-primary-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition" title="Editar Categoría"><i class="fa-solid fa-pen text-sm"></i></button>
                            <button onclick="deleteCategory('${cat.id}', event)" class="p-2 md:p-1.5 w-8 h-8 flex items-center justify-center rounded-md text-slate-400 hover:text-red-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition" title="Borrar Categoría"><i class="fa-solid fa-trash-can text-sm"></i></button>
                        </div>
                    </div>
                    <div class="space-y-3">
                `;

                const goals = data.biweeklyGoals.filter(g => g.categoryId === cat.id).sort((a,b) => a.startDate.localeCompare(b.startDate));
                
                goals.forEach(goal => {
                    const stats = getGoalStats(goal.id);
                    const isOver = stats.health === 'overbudget';
                    const goalTasks = data.tasks.filter(t => t.goalId === goal.id).sort((a,b) => parseISO(a.date) - parseISO(b.date));
                    const isGoalImported = goal.isImported;

                    html += `
                        <div class="p-3 bg-slate-50 dark:bg-surface-900/50 rounded-lg border border-slate-100 dark:border-slate-700 group cursor-pointer" onclick="toggleGoalTasks('${goal.id}')">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-semibold text-slate-700 dark:text-slate-200 truncate pr-2 flex items-center gap-2" title="${goal.title}">
                                    <i id="icon-goal-${goal.id}" class="fa-solid fa-chevron-down text-xs text-slate-400 transition-transform w-3"></i> ${goal.title}
                                </span>
                                <div class="opacity-100 xl:opacity-0 group-hover:opacity-100 flex gap-1">
                                    <button onclick="event.stopPropagation(); editGoal('${goal.id}')" class="p-2 md:p-1.5 w-7 h-7 flex items-center justify-center rounded text-slate-400 hover:text-primary-500 hover:bg-slate-200 dark:hover:bg-slate-600 transition" title="Editar"><i class="fa-solid fa-pen text-xs"></i></button>
                                    <button onclick="event.stopPropagation(); deleteGoal('${goal.id}')" class="p-2 md:p-1.5 w-7 h-7 flex items-center justify-center rounded text-red-400 hover:text-red-600 hover:bg-slate-200 dark:hover:bg-slate-600 transition" title="Borrar"><i class="fa-solid fa-xmark text-sm"></i></button>
                                </div>
                            </div>
                            <div class="text-xs text-slate-500 mb-2 pl-5">${format(parseISO(goal.startDate), 'dd MMM')} - ${format(parseISO(goal.endDate), 'dd MMM')}</div>
                            
                            ${isGoalImported ? '' : `
                            <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2 mb-1.5 relative">
                                <div class="bg-primary-500 h-2 rounded-full transition-all duration-500" style="width: ${stats.progress}%"></div>
                                ${isOver ? `<div class="absolute right-0 top-0 h-2 w-2 bg-red-500 rounded-full animate-ping"></div>` : ''}
                            </div>
                            <div class="flex justify-between text-[11px] md:text-xs text-slate-500">
                                <span class="${isOver ? 'text-red-500 font-bold' : ''}">${stats.totalHoursPlanned}h planificadas</span>
                                <span>${stats.completedHours} / ${stats.budget}h presup.</span>
                            </div>
                            `}

                            <!-- Acordeón de Tareas -->
                            <div class="mt-3 hidden" id="tasks-goal-${goal.id}" onclick="event.stopPropagation()">
                                <div class="text-xs uppercase font-bold text-slate-400 mb-2 border-b border-slate-200 dark:border-slate-600 pb-1 mt-2">Desglose de Tareas</div>
                                <div class="space-y-1.5 max-h-48 overflow-y-auto pr-1">
                                    ${goalTasks.map(t => `
                                        <div class="flex items-center justify-between text-sm md:text-xs p-1.5 hover:bg-slate-100 dark:hover:bg-surface-800 rounded transition cursor-pointer" onclick="${t.isImported ? 'event.stopPropagation()' : `toggleTaskCompletion('${t.id}', event)`}">
                                            <div class="flex items-center gap-2 truncate">
                                                ${t.isImported 
                                                    ? `<i class="fa-solid fa-circle text-[8px] text-slate-400 w-4 text-center"></i>` 
                                                    : `<i class="fa-regular ${t.completed ? 'fa-square-check text-primary-500' : 'fa-square text-slate-400'} text-base md:text-sm w-4"></i>`
                                                }
                                                <span class="${t.completed ? 'line-through text-slate-400' : 'text-slate-600 dark:text-slate-300'} truncate" title="${t.title}">${t.title}</span>
                                            </div>
                                            <span class="text-xs text-slate-400 ml-2 shrink-0">${format(parseISO(t.date), 'dd/MM')}</span>
                                        </div>
                                    `).join('')}
                                    ${goalTasks.length === 0 ? '<div class="text-xs text-slate-400 italic">No hay tareas aún.</div>' : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
                catEl.innerHTML = html;
                container.appendChild(catEl);
            });
        }

        // --- MOTORES DE CALENDARIO ---
        function renderWeekView() {
            const startD = startOfWeek(viewState.currentDate, { weekStartsOn: 1 });
            const endD = endOfWeek(viewState.currentDate, { weekStartsOn: 1 });
            const weekTasks = data.tasks.filter(t => isWithinInterval(parseISO(t.date), {start: startD, end: endD}));
            
            document.getElementById('current-date-label').textContent = `${format(startD, 'MMMM yyyy')} - Sem ${format(startD, 'w')}`;
            updateSidebarSummary(startD, endD, 'Esta Semana');

            const totalWeekHours = 168; 
            const occupiedHours = weekTasks.reduce((sum, t) => sum + t.estimatedHours, 0);
            const freeHours = totalWeekHours - occupiedHours;
            const occPercent = (occupiedHours / totalWeekHours) * 100;

            document.getElementById('weekly-balance').innerHTML = `
                <div class="text-sm font-bold text-slate-500 uppercase tracking-wider shrink-0 flex items-center gap-1.5"><i class="fa-solid fa-chart-pie"></i> Balance</div>
                <div class="flex-1 h-3 md:h-2.5 bg-green-100 dark:bg-green-900/30 rounded-full overflow-hidden flex shadow-inner">
                    <div class="bg-primary-500 h-full transition-all duration-500" style="width: ${occPercent}%"></div>
                </div>
                <div class="flex gap-4 text-xs md:text-[11px] font-bold shrink-0">
                    <span class="text-primary-600 dark:text-primary-400">${occupiedHours.toFixed(1)}h Ocupadas</span>
                    <span class="text-green-600 dark:text-green-500">${freeHours.toFixed(1)}h Libres</span>
                </div>
            `;

            let headersHtml = '';
            for(let i=0; i<7; i++) {
                const d = addDays(startD, i);
                const isToday = isSameDay(d, new Date());
                headersHtml += `
                    <div class="flex-1 text-center py-3 border-r border-slate-200 dark:border-slate-700">
                        <div class="text-xs font-semibold uppercase text-slate-500 ${isToday ? 'text-primary-600 dark:text-primary-400' : ''}">${format(d, 'EEEE')}</div>
                        <div class="text-2xl md:text-xl font-bold mt-1 md:mt-0.5 ${isToday ? 'bg-primary-600 text-white w-9 h-9 md:w-8 md:h-8 mx-auto rounded-full flex items-center justify-center' : 'text-slate-700 dark:text-slate-300'}">${format(d, 'd')}</div>
                    </div>`;
            }
            document.getElementById('week-headers').innerHTML = headersHtml;

            let gridHtml = '';
            for(let row = 1; row <= 96; row += 2) {
                if ((row - 1) % 4 === 0) {
                    let hour = Math.floor((row - 1) / 4);
                    let hourStr = hour.toString().padStart(2, '0');
                    gridHtml += `<div class="time-label dark:bg-surface-800" style="grid-row: ${row} / span 4; grid-column: 1;">${hourStr}:00</div>`;
                }
                for(let col = 2; col <= 8; col++) {
                    gridHtml += `<div class="calendar-cell" style="grid-row: ${row} / span 2; grid-column: ${col};"></div>`;
                }
            }
            
            weekTasks.forEach(task => {
                const goal = data.biweeklyGoals.find(g => g.id === task.goalId);
                const category = data.categories.find(c => c.id === goal?.categoryId);
                if(!goal || !category) return;

                const color = category.color;
                const startRow = timeToGridRow(task.startTime);
                const endRow = timeToGridRow(task.endTime);
                
                const dayOfWeek = getDay(parseISO(task.date)); 
                const col = dayOfWeek === 0 ? 8 : dayOfWeek + 1; 

                const isDone = task.completed;
                const bgStyle = isDone 
                    ? `background-color: #f1f5f9; border-color: #cbd5e1; color: #94a3b8; text-decoration: line-through; border-left-color: ${color}; opacity: 0.7;`
                    : `background-color: ${color}15; border-color: ${color}40; color: ${color}; border-left-color: ${color};`;
                
                const darkBgStyle = isDone
                    ? `background-color: #1e293b; border-color: #334155; color: #64748b; text-decoration: line-through; border-left-color: ${color}; opacity: 0.7;`
                    : `background-color: ${color}20; border-color: ${color}40; color: #f8fafc; border-left-color: ${color};`;

                gridHtml += `
                    <div class="task-card relative group cursor-pointer" onclick="editTask('${task.id}', event)"
                         style="grid-row: ${startRow} / ${endRow}; grid-column: ${col}; ${document.documentElement.classList.contains('dark') ? darkBgStyle : bgStyle}">
                        
                        <div class="flex justify-between items-start w-full">
                            <span class="font-bold truncate leading-tight pr-1" title="${task.title}">${task.title}</span>
                            ${task.isImported ? '' : `<input type="checkbox" ${isDone ? 'checked' : ''} onclick="toggleTaskCompletion('${task.id}', event)" class="cursor-pointer w-5 h-5 md:w-4 md:h-4 mt-0.5 rounded text-primary-600 focus:ring-primary-500 border-slate-300 bg-white shadow-sm shrink-0">`}
                        </div>
                        
                        <div class="flex justify-between items-end w-full mt-auto">
                            <span class="text-xs font-medium opacity-80">${task.startTime} - ${task.endTime}</span>
                            <div class="flex gap-2 opacity-100 xl:opacity-0 group-hover:opacity-100 transition-opacity bg-white/80 dark:bg-slate-800/80 p-1.5 md:p-1 rounded backdrop-blur-md">
                                <button onclick="copyTask('${task.id}', event)" title="Copiar Tarea" class="p-1 hover:text-green-600 dark:hover:text-green-400 transition transform hover:scale-110"><i class="fa-solid fa-copy text-sm md:text-[11px]"></i></button>
                                <button onclick="openMoveMenu('${task.id}', event)" title="Mover Rápido" class="p-1 hover:text-primary-600 dark:hover:text-primary-400 transition transform hover:scale-110"><i class="fa-solid fa-arrows-up-down-left-right text-sm md:text-[11px]"></i></button>
                                <button onclick="editTask('${task.id}', event)" title="Editar" class="p-1 hover:text-primary-600 dark:hover:text-primary-400 transition transform hover:scale-110"><i class="fa-solid fa-pen text-sm md:text-[11px]"></i></button>
                                <button onclick="deleteTask('${task.id}', event)" title="Borrar" class="p-1 hover:text-red-500 transition transform hover:scale-110"><i class="fa-solid fa-trash text-sm md:text-[11px]"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('week-grid').innerHTML = gridHtml;
        }

        function renderMonthView() {
            const startD = startOfMonth(viewState.currentDate);
            const endD = endOfMonth(viewState.currentDate);

        // --- SISTEMA INTELIGENTE DE HORARIOS Y HUECOS LIBRES ---
        function updateAvailableTimes() {
            const dateStr = document.getElementById('task-date').value;
            const startSelect = document.getElementById('task-start');
            
            if(!dateStr) return;

            let free = new Array(96).fill(true);
            data.tasks.forEach(t => {
                // Excluir la tarea que estamos editando para que pueda re-usar sus propios huecos
                if (t.date === dateStr && t.id !== editingTaskId) {
                    let s = Math.floor(timeToMinutes(t.startTime) / 15);
                    let e = Math.ceil(timeToMinutes(t.endTime) / 15);
                    for(let i = s; i < e; i++) {
                        if(i < 96) free[i] = false;
                    }
                }
            });

            window.currentFreeBlocks = free;

            let availableMins = new Set();
            for(let i = 0; i < 96; i++) {
                if (free[i]) availableMins.add(i * 15);
            }

            // Si editamos y tiene un tiempo extraño original, asegurarlo en la lista
            if (editingTaskId) {
                const t = data.tasks.find(t => t.id === editingTaskId);
                availableMins.add(timeToMinutes(t.startTime));
            }

            let sortedMins = Array.from(availableMins).sort((a,b) => a - b);
            
            let startValue = startSelect.value;
            startSelect.innerHTML = '<option value="" disabled selected>Selecciona inicio...</option>';
            sortedMins.forEach(m => {
                let timeStr = minsToTimeStr(m);
                startSelect.innerHTML += `<option value="${timeStr}">${timeStr}</option>`;
            });
            
            // Restablecer el valor si aún es una opción válida, si no, dejar vacío
            if (startValue && Array.from(startSelect.options).some(o => o.value === startValue)) {
                startSelect.value = startValue;
            } else {
                startSelect.value = "";
            }

            updateEndTimes();
        }

        function updateEndTimes() {
            const startSelect = document.getElementById('task-start');
            const endSelect = document.getElementById('task-end');
            const free = window.currentFreeBlocks || new Array(96).fill(true);
            
            let endValue = endSelect.value;
            endSelect.innerHTML = '<option value="" disabled selected>Selecciona fin...</option>';
            
            if (!startSelect.value) {
                endSelect.value = "";
                return;
            }

            let startMins = timeToMinutes(startSelect.value);
            let sIdx = Math.floor(startMins / 15);
            
            // Buscar cuál es el próximo bloque ocupado después del seleccionado
            let maxIdx = 96;
            for(let i = sIdx; i < 96; i++) {
                if (!free[i] && (i * 15) > startMins) {
                    maxIdx = i;
                    break;
                }
            }

            let availableMins = new Set();
            for(let i = sIdx; i <= maxIdx; i++) {
                let m = i * 15;
                if (m > startMins) availableMins.add(m);
            }

            if (editingTaskId) {
                const t = data.tasks.find(t => t.id === editingTaskId);
                let eMins = timeToMinutes(t.endTime);
                if (t.endTime === "23:59") eMins = 1440;
                if (eMins > startMins && eMins <= maxIdx * 15) {
                    availableMins.add(eMins);
                }
            }

            let sortedMins = Array.from(availableMins).sort((a,b) => a - b);
            
            sortedMins.forEach(m => {
                let timeStr = m >= 1440 ? "24:00" : minsToTimeStr(m);
                endSelect.innerHTML += `<option value="${timeStr}">${timeStr}</option>`;
            });

            if (endValue && Array.from(endSelect.options).some(o => o.value === endValue)) {
                endSelect.value = endValue;
            } else {
                endSelect.value = "";
            }
        }

                    let hasSibling = data.tasks.some(t => t.date === targetDateStr && t.title === task.title && t.id !== task.id);

        function handleTaskSubmit(e) {
            e.preventDefault();
            const goalId = document.getElementById('task-goal').value;
            const tDate = document.getElementById('task-date').value;
            const start = document.getElementById('task-start').value;
            let end = document.getElementById('task-end').value;
            const title = document.getElementById('task-title').value;

            if (!start || !end) {
                showAlert('Por favor, selecciona una hora de inicio y fin válidas de los huecos libres.');
                return;
            }

            const goal = data.biweeklyGoals.find(g => g.id === goalId);
            if(!isWithinInterval(parseISO(tDate), {start: parseISO(goal.startDate), end: parseISO(goal.endDate)})) {
                showAlert('La fecha de la tarea debe estar dentro de las fechas del objetivo.');
                return;
            }

            if (end === "24:00") end = "23:59"; 
            const startMins = timeToMinutes(start);
            const endMins = timeToMinutes(end);

            if (startMins >= endMins) { showAlert("La hora de fin debe ser posterior a la de inicio en el mismo día."); return; }

            // Solapamiento (Main Task)
            const overlapping = data.tasks.some(t => {
                if (t.id === editingTaskId) return false; 
                if (t.date !== tDate) return false;
                const eStart = timeToMinutes(t.startTime);
                const eEnd = timeToMinutes(t.endTime);
                return (startMins < eEnd && endMins > eStart);
            });

            if (overlapping) {
                showAlert("Solapamiento detectado. Ya existe otra tarea en esa fecha y franja horaria.");
                return;
            }

            let isImportedFlag = false;
            let syncedCount = 0; 

            if (editingTaskId) {
                const task = data.tasks.find(t => t.id === editingTaskId);
                const oldTitle = task.title; 
                const originalDateStr = task.date;
                
                // Actualizar la tarea base
                task.goalId = goalId;
                task.title = title;
                task.date = tDate; 
                task.startTime = start;
                task.endTime = end;
                task.estimatedHours = calculateHours(start, end);

                // R2 y R3: Aplicar solo a los días seleccionados explícitamente y que pertenezcan a LA MISMA SEMANA
                const editWeekStart = startOfWeek(parseISO(originalDateStr), {weekStartsOn: 1}); 
                const selectedDays = Array.from(document.querySelectorAll('.edit-day-cb:checked:not(:disabled)')).map(cb => parseInt(cb.value));

                selectedDays.forEach(dayVal => {
                    let targetDate = dayVal === 0 ? addDays(editWeekStart, 6) : addDays(editWeekStart, dayVal - 1);
                    let targetDateStr = format(targetDate, 'yyyy-MM-dd');
                    
                    if (targetDateStr === originalDateStr) return; // Ya actualizada arriba

                    // Encontrar a la hermana para ajustarle el intervalo
                    let siblingTask = data.tasks.find(t => t.id !== task.id && t.date === targetDateStr && t.title === oldTitle);
                    if (siblingTask) {
                        siblingTask.title = title;
                        siblingTask.startTime = start;
                        siblingTask.endTime = end;
                        siblingTask.estimatedHours = calculateHours(start, end);
                        syncedCount++;
                    }
                });

            } else {
                if (goal.isImported) isImportedFlag = true;

                data.tasks.push({
                    id: generateId(), goalId: goalId, title: title, date: tDate, startTime: start, endTime: end,
                    estimatedHours: calculateHours(start, end), completed: false, isImported: isImportedFlag
                });
            }
            
            saveData();
            closeModal('modal-task');

            if (syncedCount > 0) {
                setTimeout(() => showAlert(`Se ha ajustado el horario de ${syncedCount} tareas de la semana sincronizadas con éxito.`), 350);
            }
        }

        function executeTaskMove(daysToAdd) {
            if(!taskToMoveId) return;
            const task = data.tasks.find(t => t.id === taskToMoveId);
            const goal = data.biweeklyGoals.find(g => g.id === task.goalId);
            
            if(task && goal) {
                const newDate = addDays(parseISO(task.date), daysToAdd);
                
                if(!isWithinInterval(newDate, {start: parseISO(goal.startDate), end: parseISO(goal.endDate)})) {
                    showAlert(`No puedes mover la tarea fuera de las fechas del objetivo (${format(parseISO(goal.startDate),'dd/MM')} al ${format(parseISO(goal.endDate),'dd/MM')}).`);
                } else {
                    const startMins = timeToMinutes(task.startTime);
                    const endMins = timeToMinutes(task.endTime);
                    const tDate = format(newDate, 'yyyy-MM-dd');

                    const overlapping = data.tasks.some(t => {
                        if (t.id === task.id) return false;
                        if (t.date !== tDate) return false;
                        const eStart = timeToMinutes(t.startTime);
                        const eEnd = timeToMinutes(t.endTime);
                        return (startMins < eEnd && endMins > eStart);
                    });

                    if (overlapping) {
                        showAlert("Solapamiento detectado en el nuevo día.");
                    } else {
                        task.date = tDate;
                        saveData();
                    }
                }
            }
            closeModal('modal-move');
            taskToMoveId = null;
        }

        // --- 5. LÓGICA DE EXPORTACIÓN / IMPORTACIÓN JSON ---
        function exportData() {
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SaaS_Backup_${format(new Date(), 'yyyyMMdd')}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showAlert("Exportación de copia de seguridad completada correctamente.");
        }

        function processImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    
                    // Comprobamos si el JSON es un Backup completo (tiene categorías, objetivos y tareas)
                    if (json && !Array.isArray(json) && json.categories && json.biweeklyGoals && json.tasks) {
                        showConfirm("¿Restaurar copia de seguridad? Esto reemplazará todos los datos actuales del calendario.", () => {
                            data = json;
                            saveData();
                            showAlert("Copia de seguridad restaurada con éxito.");
                        });
                    } 
                    // Si es un Array, asumimos que es el JSON inicial de rutinas (Obligaciones)
                    else if (Array.isArray(json)) {
                        generateTasksFromJSON(json);
                    } 
                    else {
                        showAlert("El formato del JSON no es compatible. Debe ser un backup o un esquema de rutinas válido.");
                    }
                } catch (err) {
                    showAlert("El archivo no es un JSON válido.");
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        function generateTasksFromJSON(jsonArray) {
            if (!Array.isArray(jsonArray)) {
                return showAlert("El JSON debe tener un formato de array válido.");
            }

            const dayMap = {
                "domingo": 0, "lunes": 1, "martes": 2, "miércoles": 3, "miercoles": 3,
                "jueves": 4, "viernes": 5, "sábado": 6, "sabado": 6
            };

            const today = new Date();
            const startD = new Date(today.getFullYear(), today.getMonth(), 1);
            const endD = new Date(today.getFullYear(), today.getMonth() + 2, 1); 

            let catId = data.categories.find(c => c.name === 'Obligaciones')?.id;
            if (!catId) {
                catId = generateId();
                data.categories.push({ id: catId, name: 'Obligaciones', color: '#94a3b8', isImported: true });
            }
            
            const goalId = generateId();
            data.biweeklyGoals.push({
                id: goalId,
                categoryId: catId,
                title: `Lote Importado (${format(new Date(), 'dd/MM')})`,
                startDate: format(startD, 'yyyy-MM-dd'),
                endDate: format(endD, 'yyyy-MM-dd'),
                budgetedHours: 0,
                isImported: true
            });

            let tasksCreated = 0;
            let tasksSkipped = 0;

            function insertTask(dateStr, title, startStr, endStr) {
                let sMins = timeToMinutes(startStr);
                let eMins = timeToMinutes(endStr);
                
                if (sMins >= eMins) return; 

                const overlapping = data.tasks.some(t => {
                    if (t.date !== dateStr) return false;
                    const eStart = timeToMinutes(t.startTime);
                    const eEnd = timeToMinutes(t.endTime);
                    return (timeToMinutes(startStr) < eEnd && timeToMinutes(endStr) > eStart);
                });

                if (overlapping) {
                    tasksSkipped++;
                } else {
                    data.tasks.push({
                        id: generateId(),
                        goalId: goalId,
                        title: title,
                        date: dateStr,
                        startTime: startStr,
                        endTime: endStr,
                        estimatedHours: calculateHours(startStr, endStr),
                        completed: false,
                        isImported: true
                    });
                    tasksCreated++;
                }
            }

            let currentD = new Date(startD);
            while (currentD <= endD) {
                const currentDayOfWeek = getDay(currentD);
                const dStr = format(currentD, 'yyyy-MM-dd');
                const nextDayStr = format(addDays(currentD, 1), 'yyyy-MM-dd');

                jsonArray.forEach(item => {
                    if (!item.dia || !item.hora_inicio || !item.hora_fin || !item.tarea) return;
                    
                    const jsonDay = item.dia.toLowerCase();
                    if (dayMap[jsonDay] === currentDayOfWeek) {
                        const startMins = timeToMinutes(item.hora_inicio);
                        const endMins = timeToMinutes(item.hora_fin);

                        if (startMins >= endMins) {
                            insertTask(dStr, item.tarea, item.hora_inicio, "23:59");
                            insertTask(nextDayStr, item.tarea, "00:00", item.hora_fin);
                        } else {
                            insertTask(dStr, item.tarea, item.hora_inicio, item.hora_fin);
                        }
                    }
                });
                currentD = addDays(currentD, 1);
            }

            saveData();
            showAlert(`Importación completada: ${tasksCreated} tareas generadas. ${tasksSkipped > 0 ? '(' + tasksSkipped + ' bloques se ignoraron por solapamiento).' : ''}`);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            }
            renderAll(); 
        }

        window.onload = loadData;

    </script>
</body>
